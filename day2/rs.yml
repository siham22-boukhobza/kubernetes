
# this demo is for ReplicaSet 
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  labels:
    env: demo
  name: rs-nginx
spec:
  template:
    metadata: 
      name: nginx-pod
      labels:
        env: demo
    spec:
      containers:
      - name: nginx-container
        image: nginx
        ports:
        - containerPort: 80
  replicas: 3 
  selector:
    matchLabels:
      env: demo     
